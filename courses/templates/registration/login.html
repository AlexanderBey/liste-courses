{% extends 'base.html' %}  <!-- si tu as un base.html -->

{% block content %}
  <h2>Connexion</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Se connecter</button>
  </form>

  <p class="text-center mt-3">
    Pas de compte ? <a href="{% url 'register' %}">Créer un compte</a>
</p>
{% endblock %}
