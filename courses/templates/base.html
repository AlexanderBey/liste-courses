<!DOCTYPE html>
<html>
<head>
    <title>Liste de courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    {% if user.is_authenticated %}
        <p>Bienvenue {{ user.username }} | <form method="post" action="{% url 'logout' %}" class="d-inline" onsubmit="return confirm('Voulez-vous vraiment vous déconnecter ?');">
    {% csrf_token %}
    <button type="submit" class="text-decoration-underline">Déconnexion</button>
</form></p>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
